worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11:53 valid=10s;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "OK";
        }

        # Identity API (MapIdentityApi) — racine de l’API, pas sous /api/v1/
        location = /login {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location = /refresh {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/users/register {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/users/me {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/payments/checkout {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/payments/create-transfer {
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/payments/create-connect-account{
            proxy_pass http://ecoscolar-web-api:8080;
        }

        location /api/v1/payments/create-account-link{
            proxy_pass http://ecoscolar-web-api:8080;
        }

        error_page 502 503 504 =503 /service-unavailable;

        location = /service-unavailable {
            internal;
            default_type application/json;
            add_header Retry-After 30;
            return 503 '{"error":"Service temporarily unavailable"}';
        }
    }
}
